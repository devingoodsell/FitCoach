name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: backend (go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: fitcoach
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpw"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      FITCOACH_TEST_MYSQL_DSN: "root:rootpw@tcp(127.0.0.1:3306)/fitcoach?parseTime=true&loc=UTC"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race ./...

  android:
    name: android (kotlin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for Android project
        id: check
        run: |
          if [ -f android/gradlew ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "Android project not yet scaffolded; skipping."
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-java@v4
        if: steps.check.outputs.present == 'true'
        with:
          distribution: temurin
          java-version: "21"
      - name: Lint + unit tests
        if: steps.check.outputs.present == 'true'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon lintDebug testDebugUnitTest

openapi: 3.1.0
info:
  title: FitCoach Backend API
  version: 0.1.0
  description: >
    Client ↔ server contract for FitCoach. The Android client talks ONLY to this
    service; it never calls Anthropic directly. The Claude API key is server-side
    only. This document is the source of truth for Wave 0 (auth, consent, account,
    Coach Memory). Memory/workout paths are added in E3-PR1.

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: health
  - name: auth
  - name: consent
  - name: account
  - name: memory
  - name: onboarding
  - name: locations
  - name: diet
  - name: readiness
  - name: injuries
  - name: sessions

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /disclaimers:
    get:
      tags: [health]
      summary: Fetch centrally-managed disclaimer copy (E13-S1)
      security: []
      description: >
        Single source of truth for medical and health-data disclaimer text. The
        version matches the consent version recorded at /consent. Public so it can
        be shown at onboarding and the consent step before a session exists.
      responses:
        "200":
          description: Current disclaimer document
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string, example: v1 }
                  medical: { type: string }
                  health_data: { type: string }

  /auth/signup:
    post:
      tags: [auth]
      summary: Create an account and sign in (E1-S1)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "201":
          description: Account created; session issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "400":
          description: Validation error (email format / weak password)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: >
            Non-enumerating conflict response. The body is intentionally generic
            so an attacker cannot confirm an email is registered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/login:
    post:
      tags: [auth]
      summary: Authenticate and start a session (E1-S2, E1-S6)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "200":
          description: Authenticated; session issued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401":
          description: Generic authentication failure (no enumeration)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          description: Too many attempts; backed off (E1-S2)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Exchange a refresh token for a new token pair (rotation)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200":
          description: New rotated token pair
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401":
          description: Invalid, expired, or revoked refresh token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke the supplied refresh token (E1-S2)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "204":
          description: Refresh token revoked (idempotent)

  /auth/reset/request:
    post:
      tags: [auth]
      summary: Request a password reset (E1-S3)
      security: []
      description: >
        Always returns 200 regardless of whether the email exists, to prevent
        account enumeration. A time-limited, single-use token is emailed when the
        account exists. Email delivery is stubbed/logged in MVP.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetRequest" }
      responses:
        "200":
          description: Accepted (whether or not the email exists)

  /auth/reset/confirm:
    post:
      tags: [auth]
      summary: Complete a password reset (E1-S3)
      security: []
      description: >
        Consumes a single-use token, sets the new password, and revokes all other
        sessions for the account.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetConfirm" }
      responses:
        "204":
          description: Password changed; other sessions revoked
        "400":
          description: Token invalid/expired/used or weak password
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /consent:
    get:
      tags: [consent]
      summary: List the caller's recorded consents (E1-S4)
      responses:
        "200":
          description: Current consent state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConsentList" }
    post:
      tags: [consent]
      summary: Record acceptance of a consent/disclaimer version (E1-S4)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConsentRequest" }
      responses:
        "201":
          description: Consent recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConsentRecord" }

  /account:
    delete:
      tags: [account]
      summary: Delete the account and all associated data (E1-S5)
      description: >
        Requires password confirmation. Cascades deletion across profile, Coach
        Memory, workout history, consents, and sessions. Idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeleteAccount" }
      responses:
        "200":
          description: Deletion completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: deleted }
        "401":
          description: Confirmation failed

  /memory:
    get:
      tags: [memory]
      summary: Read all Coach Memory sections (E3-S1)
      description: >
        Returns every stored singleton section for the caller, each upgraded to
        the current schema version on read.
      responses:
        "200":
          description: All sections
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemorySections" }

  /memory/{section}:
    parameters:
      - name: section
        in: path
        required: true
        schema:
          type: string
          enum: [profile, goals, schedule, preferences, locations, injuries, diet]
    get:
      tags: [memory]
      summary: Read one Coach Memory section (E3-S1)
      responses:
        "200":
          description: The section
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemorySection" }
        "404":
          description: Section not yet set
        "400":
          description: Unknown section name
    put:
      tags: [memory]
      summary: Create or replace a Coach Memory section (E3-S1)
      description: >
        Upserts the section's JSON document at the current schema version. The
        document shape is owned by the domain epics (E2/E7/E9/E11); the contract
        treats data as an opaque object here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: Section payload (shape owned by the domain epic)
              required: [data]
      responses:
        "200":
          description: Section stored
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemorySection" }
        "400":
          description: Unknown section or malformed data

  /workouts:
    get:
      tags: [memory]
      summary: List recent recorded sessions (E3-S3)
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 30, maximum: 200 }
      responses:
        "200":
          description: Recent workout logs (most recent first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  workouts:
                    type: array
                    items: { $ref: "#/components/schemas/WorkoutLog" }
    post:
      tags: [memory]
      summary: Record a completed session (E3-S3)
      description: >
        Idempotent on client_session_id: re-posting the same session (e.g. an
        offline client re-syncing) updates rather than duplicates it.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkoutLogInput" }
      responses:
        "200":
          description: Session recorded (or re-confirmed)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkoutLog" }
        "400":
          description: Malformed payload

  /onboarding/profile:
    put:
      tags: [onboarding]
      summary: Save profile & physiology (E2-S2/S3/S8)
      description: >
        Validates and persists the profile section: DOB (preferred) or age, sex,
        optional height/weight, experience, and aging emphases. Weight is appended
        to a timestamped history; aging emphases default from age when omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Profile" }
      responses:
        "200":
          description: Stored profile (with derived history/defaults)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }

  /onboarding/goals:
    put:
      tags: [onboarding]
      summary: Save goal weighting (E2-S4)
      description: Goal weights stored as a distribution normalized to sum 1.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GoalWeights" }
      responses:
        "200":
          description: Stored (normalized) goal weights
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GoalWeights" }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }

  /onboarding/schedule:
    put:
      tags: [onboarding]
      summary: Save training schedule (E2-S5)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Schedule" }
      responses:
        "200":
          description: Stored schedule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Schedule" }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }

  /onboarding/diet:
    put:
      tags: [onboarding]
      summary: Save dietary preferences (E2-S7)
      description: Dietary pattern + free-text supplements/medications, read by E11.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DietPrefs" }
      responses:
        "200":
          description: Stored dietary preferences
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DietPrefs" }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }

  /onboarding/preferences:
    put:
      tags: [onboarding]
      summary: Save exercise/equipment preferences (E2-S6)
      description: Likes, dislikes, and hard-avoids (hard-avoids are planning constraints).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Preferences" }
      responses:
        "200":
          description: Stored preferences
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Preferences" }

  /locations:
    get:
      tags: [locations]
      summary: List locations and current context (E9-S1)
      responses:
        "200":
          description: Locations document
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LocationsDoc" }
    post:
      tags: [locations]
      summary: Add a location (E9-S1)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LocationInput" }
      responses:
        "201":
          description: Created location (server-assigned id)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Location" }
        "400": { description: Name required }

  /locations/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    put:
      tags: [locations]
      summary: Update a location (E9-S1)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LocationInput" }
      responses:
        "200":
          description: Updated location
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Location" }
        "404": { description: Not found }
    delete:
      tags: [locations]
      summary: Delete a location (E9-S1)
      description: Clears the current context if it pointed at this location.
      responses:
        "204": { description: Deleted }
        "404": { description: Not found }

  /locations/current:
    put:
      tags: [locations]
      summary: Switch current training context (E9-S2)
      description: >
        Sets the active location whose equipment constrains generation. The change
        is timestamped and acts as a re-planning trigger (E5-S5).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [location_id]
              properties:
                location_id: { type: string }
                note: { type: string, example: "traveling this week, hotel gym only" }
      responses:
        "200":
          description: Current context set
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurrentContext" }
        "404": { description: Location not found }

  /diet/targets:
    get:
      tags: [diet]
      summary: Daily calorie/protein targets and preference-aware guidance (E11-S1/S2)
      description: >
        Computed from profile, goals, schedule, and dietary pattern in Coach
        Memory. Framed as guidance, not medical advice. low_confidence is true when
        inputs (e.g. weight) are missing.
      responses:
        "200":
          description: Targets, guidance, and disclaimer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DietTargets" }

  /diet/post-workout-note:
    get:
      tags: [diet]
      summary: Brief post-session nutrition note (E11-S3)
      parameters:
        - name: intensity
          in: query
          required: false
          schema: { type: string, enum: [heavy, light], default: light }
      responses:
        "200":
          description: Preference-aware, non-prescriptive note + disclaimer
          content:
            application/json:
              schema:
                type: object
                properties:
                  note: { type: string }
                  disclaimer: { type: string }

  /health/signals:
    post:
      tags: [readiness]
      summary: Upload raw recovery signals (E4-S1)
      description: >
        Idempotent on (kind, day). Gated by health-data consent — returns 403 if
        the user has not consented (E1-S4). The backend computes its own readiness
        from these raw samples; it does not store a vendor score.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                samples:
                  type: array
                  items: { $ref: "#/components/schemas/HealthSignal" }
      responses:
        "204": { description: Stored }
        "403": { description: Health-data consent required }

  /readiness:
    get:
      tags: [readiness]
      summary: Today's readiness with explanation (E4-S2/S3)
      description: >
        Computed from raw HRV/RHR/sleep vs the user's rolling baseline. Degrades to
        a neutral, low-confidence score when data is missing. The explanation names
        the main drivers in plain language with no medical claims.
      responses:
        "200":
          description: Readiness score
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Readiness" }

  /injuries:
    get:
      tags: [injuries]
      summary: List injuries (E7-S1/S2)
      responses:
        "200":
          description: Injuries document
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InjuriesDoc" }
    post:
      tags: [injuries]
      summary: Add an injury (E7-S1)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Injury" }
      responses:
        "201":
          description: Created injury
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Injury" }
        "400": { description: Validation error }

  /injuries/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    put:
      tags: [injuries]
      summary: Update an injury / change status (E7-S2)
      description: A status change marks a re-planning trigger (E5-S5).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Injury" }
      responses:
        "200":
          description: Updated injury
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Injury" }
        "404": { description: Not found }
    delete:
      tags: [injuries]
      summary: Remove an injury (E7-S2)
      responses:
        "204": { description: Deleted }
        "404": { description: Not found }

  /injuries/parse:
    post:
      tags: [injuries]
      summary: Parse a freeform description into a reviewable draft (E7-S1)
      description: >
        Returns a best-effort structured draft for the user to review/correct
        before saving; low_confidence_fields names uncertain slots. Heuristic
        stand-in until the LLM-backed parser lands in E5.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
      responses:
        "200":
          description: Draft for review
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InjuryDraft" }
        "400": { description: Text required }

  /sessions/generate:
    post:
      tags: [sessions]
      summary: Generate a full workout session (E5-S1, E8-S1)
      description: >
        The single "Start workout" call. The server assembles Coach Memory +
        today's readiness + active injuries (contraindications) + current
        location/equipment + plan position, makes ONE server-side Claude call,
        parses a structured session (warmup / main work with loads-reps-rests /
        accessory / aging block + reasoning), and runs it through the
        deterministic safety layer BEFORE returning. Loads are canonical kg; the
        client converts to the user's preferred unit for display. The client may
        cache the returned session for offline use (E5-S3). The Claude API key is
        server-side only — the client never calls Anthropic directly.
      responses:
        "200":
          description: A validated, ready-to-run session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "422":
          description: A safe session could not be produced (e.g. unresolved contraindication)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /sessions/replan-check:
    get:
      tags: [sessions]
      summary: Should the cached session be regenerated? (E5-S5)
      description: >
        Deterministic, no Claude call. Given the client's cached session
        timestamp, reports whether the inputs that drove that plan have
        materially changed — a new/changed injury, a current-context (location)
        change, or a poor-recovery morning. The client regenerates when
        replan_needed is true; otherwise it keeps using its offline cache and
        re-plans on the next session by default.
      parameters:
        - name: since
          in: query
          required: true
          description: generated_at of the client's cached session (RFC 3339)
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Re-plan decision
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplanCheck" }
        "400": { description: Missing or invalid 'since' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Credentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, minLength: 10, maxLength: 256 }

    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string, description: Short-lived signed JWT }
        refresh_token: { type: string, description: Opaque, revocable, rotated on use }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer, description: Access token lifetime in seconds }

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    ResetRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    ResetConfirm:
      type: object
      required: [token, new_password]
      properties:
        token: { type: string }
        new_password: { type: string, minLength: 10, maxLength: 256 }

    ConsentRequest:
      type: object
      required: [type, version]
      properties:
        type:
          type: string
          description: Consent category
          enum: [health_data, medical_disclaimer]
        version: { type: string, description: Disclaimer/policy version accepted }

    ConsentRecord:
      type: object
      properties:
        type: { type: string }
        version: { type: string }
        accepted_at: { type: string, format: date-time }

    ConsentList:
      type: object
      properties:
        consents:
          type: array
          items: { $ref: "#/components/schemas/ConsentRecord" }

    DeleteAccount:
      type: object
      required: [password]
      properties:
        password: { type: string, description: Re-auth confirmation }

    MemorySection:
      type: object
      properties:
        section:
          type: string
          enum: [profile, goals, schedule, preferences, locations, injuries, diet]
        schema_version: { type: integer, description: Schema version after read-time upgrade }
        data: { type: object, description: Section payload (shape owned by the domain epic) }
        updated_at: { type: string, format: date-time }

    MemorySections:
      type: object
      properties:
        sections:
          type: array
          items: { $ref: "#/components/schemas/MemorySection" }

    WorkoutLogInput:
      type: object
      required: [client_session_id, performed_at, data]
      properties:
        client_session_id: { type: string, maxLength: 64, description: Idempotency key }
        performed_at: { type: string, format: date-time }
        data: { type: object, description: Logged session (exercises, reps, weight, rests, autoreg events) }

    WorkoutLog:
      type: object
      properties:
        id: { type: string }
        client_session_id: { type: string }
        schema_version: { type: integer }
        performed_at: { type: string, format: date-time }
        data: { type: object }

    Profile:
      type: object
      required: [sex, experience]
      properties:
        dob: { type: string, format: date, description: "YYYY-MM-DD (preferred over age)" }
        age: { type: integer, minimum: 13, maximum: 120 }
        sex: { type: string, enum: [male, female, other] }
        height_cm: { type: number }
        weight_kg: { type: number, description: Appended to a timestamped history server-side }
        weight_history:
          type: array
          readOnly: true
          items:
            type: object
            properties:
              kg: { type: number }
              recorded_at: { type: string, format: date-time }
        experience:
          type: object
          required: [level]
          properties:
            training_age_years: { type: number }
            level: { type: string, enum: [novice, intermediate, advanced] }
            benchmark_lifts:
              type: array
              items:
                type: object
                properties:
                  name: { type: string }
                  one_rep_max_kg: { type: number }
        aging_emphases:
          type: object
          description: Defaults from age when omitted; adjustable.
          properties:
            bone_balance: { type: number }
            joint_tendon: { type: number }
            vo2max: { type: number }
            cardio_base: { type: number }

    GoalWeights:
      type: object
      properties:
        strength: { type: number, minimum: 0 }
        healthspan: { type: number, minimum: 0 }
        body_composition: { type: number, minimum: 0 }
        performance: { type: number, minimum: 0 }

    Schedule:
      type: object
      required: [days_per_week, session_length_min]
      properties:
        days_per_week: { type: integer, minimum: 1, maximum: 7 }
        session_length_min: { type: integer, minimum: 10, maximum: 240 }
        preferred_days: { type: array, items: { type: string } }
        preferred_times: { type: array, items: { type: string } }

    DietPrefs:
      type: object
      required: [pattern]
      properties:
        pattern: { type: string, enum: [omnivore, vegan, vegetarian, pescatarian, kosher, halal] }
        supplements: { type: string }
        medications: { type: string }

    Preferences:
      type: object
      properties:
        likes: { type: array, items: { type: string } }
        dislikes: { type: array, items: { type: string } }
        hard_avoids: { type: array, items: { type: string }, description: Treated as planning constraints }

    Location:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        equipment: { type: array, items: { type: string } }

    LocationInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        equipment: { type: array, items: { type: string } }

    CurrentContext:
      type: object
      properties:
        location_id: { type: string }
        note: { type: string }
        changed_at: { type: string, format: date-time }

    LocationsDoc:
      type: object
      properties:
        locations:
          type: array
          items: { $ref: "#/components/schemas/Location" }
        current_context: { $ref: "#/components/schemas/CurrentContext" }

    DietTargets:
      type: object
      properties:
        targets:
          type: object
          properties:
            calories_min: { type: integer }
            calories_max: { type: integer }
            protein_min_g: { type: integer }
            protein_max_g: { type: integer }
            low_confidence: { type: boolean }
        guidance: { type: array, items: { type: string } }
        pattern: { type: string }
        disclaimer: { type: string }

    HealthSignal:
      type: object
      required: [kind, value, day]
      properties:
        kind: { type: string, enum: [hrv_ms, rhr_bpm, sleep_minutes] }
        value: { type: number }
        day: { type: string, format: date, description: "YYYY-MM-DD the sample pertains to" }

    Readiness:
      type: object
      properties:
        value: { type: integer, description: "0-100 (50 = neutral)" }
        confidence: { type: string, enum: [high, medium, low] }
        drivers: { type: array, items: { type: string } }
        explanation: { type: string, description: Plain-language, no medical claims }

    Injury:
      type: object
      required: [region, status]
      properties:
        id: { type: string, readOnly: true }
        region: { type: string, example: left_knee }
        status: { type: string, enum: [active_flare, managed, recurring_but_fine, resolved] }
        severity: { type: string, enum: [mild, moderate, severe] }
        aggravating_movements: { type: array, items: { type: string } }
        onset_date: { type: string, format: date }
        notes: { type: string }
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }

    InjuriesDoc:
      type: object
      properties:
        injuries:
          type: array
          items: { $ref: "#/components/schemas/Injury" }
        changed_at: { type: string, format: date-time, description: Last lifecycle change (re-plan trigger) }

    InjuryDraft:
      type: object
      properties:
        injury: { $ref: "#/components/schemas/Injury" }
        low_confidence_fields: { type: array, items: { type: string } }

    Session:
      type: object
      required: [id, generated_at, schema_version, warmup, main_work, accessory, aging_block, reasoning, disclaimer]
      properties:
        id: { type: string, description: Server-assigned session id (UUIDv7) }
        generated_at: { type: string, format: date-time }
        schema_version: { type: integer, const: 1 }
        model: { type: string, description: Model id used (e.g. claude-opus-4-8) }
        inputs_summary:
          $ref: "#/components/schemas/SessionInputsSummary"
        warmup:    { type: array, items: { $ref: "#/components/schemas/SessionExercise" } }
        main_work: { type: array, items: { $ref: "#/components/schemas/SessionExercise" } }
        accessory: { type: array, items: { $ref: "#/components/schemas/SessionExercise" } }
        aging_block:
          $ref: "#/components/schemas/AgingBlock"
        reasoning:
          type: array
          description: 2–5 brief plain-language notes; no medical claims (E5-S2).
          items: { $ref: "#/components/schemas/ReasoningNote" }
        safety_findings:
          type: array
          description: Safety corrections applied (redacted detail). Empty on Pass.
          items: { $ref: "#/components/schemas/SafetyFinding" }
        disclaimer: { type: string, description: "guidance, not medical advice (E13-S1)" }

    SessionExercise:
      type: object
      required: [name, movement, sets]
      properties:
        name:     { type: string, example: "Goblet squat" }
        movement: { type: string, description: Canonical movement key for safety matching }
        region:   { type: string, description: Body region, for injury matching }
        sets:
          type: array
          items: { $ref: "#/components/schemas/SetPrescription" }
        notes: { type: string }

    SetPrescription:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [reps, time, distance] }
        reps:         { type: integer, minimum: 1 }
        load_kg:      { type: number,  minimum: 0, description: Canonical kilograms; omit for bodyweight }
        rpe_target:   { type: number,  minimum: 1, maximum: 10 }
        duration_sec: { type: integer, minimum: 1 }
        rest_sec:     { type: integer, minimum: 0, description: Explicit rest after this set (E5-S1) }

    AgingBlock:
      type: object
      required: [emphases, items]
      description: Healthspan block — required in every session (E8-S1).
      properties:
        emphases:
          type: array
          description: Which aging emphases drove this block.
          items: { type: string, enum: [bone_balance, joint_tendon, vo2max, cardio_base] }
        items:
          type: array
          items: { $ref: "#/components/schemas/SessionExercise" }

    ReasoningNote:
      type: object
      required: [text]
      properties:
        text: { type: string }
        tag:  { type: string, enum: [intensity, exercise_choice, injury_accommodation, age_aware, recovery] }

    SafetyFinding:
      type: object
      required: [rule, action]
      properties:
        rule:   { type: string }
        action: { type: string, enum: [cap, block] }
        detail: { type: string }

    SessionInputsSummary:
      type: object
      description: Redacted summary of what fed generation (audit aid).
      properties:
        readiness_value: { type: integer }
        readiness_confidence: { type: string, enum: [high, medium, low] }
        contraindication_count: { type: integer }
        location_name: { type: string }
        aging_emphases:
          type: array
          items: { type: string }

    ReplanCheck:
      type: object
      required: [replan_needed, reasons]
      properties:
        replan_needed: { type: boolean }
        reasons:
          type: array
          items: { type: string, enum: [injury_changed, context_changed, poor_recovery] }

    ValidationError:
      type: object
      properties:
        error: { type: string, example: validation_failed }
        message: { type: string }
        fields:
          type: object
          additionalProperties: { type: string }
          description: Per-field error messages

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string, description: Machine-readable code }
        message: { type: string, description: Human-readable detail }

security:
  - bearerAuth: []
